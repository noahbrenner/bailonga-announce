<!doctype html><html lang="en-us"><head><title>Bailonga Templates</title><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="initial-scale=1"><link rel="stylesheet" href="styles.1584be.css"><script async src="app.2fc97b.js"></script></head><body><h1 class="main-heading">Bailonga Templates</h1><section><h2>Enter values for this week's event</h2><form autocomplete="off"><label for="title">Event Title<input data-bind="textInput: title" id="title" spellcheck="true"></label><label for="date">Event Date<input data-bind="value: date" id="date" type="date" min="2015-01-06" step="7"></label><label for="cost">Cost<input data-bind="textInput: cost" id="cost" spellcheck="false"></label><fieldset><legend>Schedule</legend><ul data-bind="foreach: scheduleItems"><li><label data-bind="attr: {for: 'start' + $index()}">Start time<input data-bind="value: start, attr: {id: 'start' + $index()}" type="time" min="19:00" max="23:00" step="900"></label><label data-bind="attr: {for: 'end' + $index()}">End time (optional)<input data-bind="value: end, attr: {id: 'end' + $index()}" type="time" min="19:00" max="23:00" step="900"></label><label data-bind="attr: {for: 'description' + $index()}">Description<input data-bind="textInput: description, attr: {id: 'description' + $index()}" spellcheck="false"></label><button data-bind="click: remove">Delete</button></li></ul><button data-bind="click: addScheduleItem" type="button">Add schedule item</button></fieldset><label for="intro">Organizer's intro<textarea data-bind="textInput: intro" id="intro" spellcheck="true"></textarea></label><label for="dj">DJ<input data-bind="textInput: dj" id="dj" spellcheck="false"></label><label for="musicType">Music type<select data-bind="value: musicType, options: musicTypeOptions" id="musicType"></select></label><label for="teacherIntermediate">Intermediate lesson teacher<input data-bind="textInput: teacherIntermediate" id="teacherIntermediate" spellcheck="false"></label><label for="topicIntermediate">Intermediate lesson topic<input data-bind="textInput: topicIntermediate" id="topicIntermediate" spellcheck="false"></label><label for="teacherBeginner">Beginner lesson teacher<input data-bind="textInput: teacherBeginner" id="teacherBeginner" spellcheck="false"></label><label for="topicBeginner">Beginner lesson topic<select data-bind="value: topicBeginner, options: topicBeginnerOptions" id="topicBeginner"></select></label><fieldset><legend>Upcoming Events</legend><ul data-bind="foreach: upcomingEvents"><li><label data-bind="attr: {for: 'date' + $index()}">Date<input data-bind="value: date, attr: {id: 'date' + $index()}" type="date" min="2015-01-06" step="7"></label><label data-bind="attr: {for: 'title' + $index()}">Title<input data-bind="textInput: title, attr: {id: 'title' + $index()}" spellcheck="true"></label><button data-bind="click: remove">Delete</button></li></ul><button data-bind="click: addUpcomingEvent" type="button">Add upcoming event</button></fieldset><label for="photoCredit">Photo credit<input data-bind="textInput: photoCredit" id="photoCredit" spellcheck="false"></label><label for="photoCreditMailchimp">Mailchimp photo credit<input data-bind="textInput: photoCreditMailchimp" id="photoCreditMailchimp" spellcheck="false"></label><label for="facebookEventUrl">Facebook event URL<input data-bind="textInput: facebookEventUrl" id="facebookEventUrl" type="url" spellcheck="false"></label></form></section><section><h2>Copy the results below</h2><h3>Facebook Event</h3><input data-bind="value: title" readonly="readonly" spellcheck="false"><textarea data-bind="value: facebook" readonly="readonly" spellcheck="false"></textarea><h3>etango email</h3><div class="output-html etango" data-bind="html: etango"></div><h3>EugeneTango.com event</h3><div class="output-pair"><textarea data-bind="value: eugeneTango" readonly="readonly" spellcheck="false"></textarea><div class="output-html" data-bind="html: eugeneTango"></div></div><h3>Bailonga website</h3><div class="output-pair"><textarea data-bind="value: bailonga" readonly="readonly" spellcheck="false"></textarea><div class="output-html" data-bind="html: bailonga"></div></div><h3>Mailchimp email</h3><div class="output-pair"><textarea data-bind="value: mailchimp1" readonly="readonly" spellcheck="false"></textarea><div class="output-html" data-bind="html: mailchimp1"></div></div><div class="output-pair"><textarea data-bind="value: mailchimp2" readonly="readonly" spellcheck="false"></textarea><div class="output-html" data-bind="html: mailchimp2"></div></div><div class="output-pair"><textarea data-bind="value: mailchimp3" readonly="readonly" spellcheck="false"></textarea><div class="output-html" data-bind="html: mailchimp3"></div></div></section></body></html>
